  },

const callGemini = async (prompt, signal, key) => {
  if (!key) throw new Error("Clé API manquante");
  const cleanKey = key.trim();
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=${cleanKey}`;
  const payload = { contents: [{ role: "user", parts: [{ text: prompt }] }], system_instruction: { parts: [{ text: CONFIG.aiPromptRole }] } };
  let retries = 5, delay = 1000;
  
  while (retries > 0) {
    try {
      if (signal?.aborted) throw new DOMException('Aborted', 'AbortError');
      const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal });
      if (!response.ok) {
        let errorMsg = `Erreur API (HTTP ${response.status})`;
        try { const errObj = await response.json(); if (errObj?.error?.message) errorMsg += ` : ${errObj.error.message}`; } catch(e) {}
        throw new Error(errorMsg);
      }
      const data = await response.json();
      return data?.candidates?.[0]?.content?.parts?.[0]?.text || "Aucune réponse générée.";
    } catch (error) {
      if (error.name === 'AbortError') throw error;
      if (error.message.includes('API') && (error.message.includes('400') || error.message.includes('403'))) throw error;
      retries--;
      if (retries === 0) throw error;
      await new Promise(res => setTimeout(res, delay));
      delay *= 2;
    }
  }
};

const formatAiText = (text) => {
  if (!text) return null;
  const normalizedText = text.replace(/\\n/g, '\\n');
  return normalizedText.split('\\n').map((line, i) => {
    if (!line.trim()) return <br key={i} />;
    const parts = line.split(/(\*\*.*?\*\*)/g).map((part, j) => {
      if (part.startsWith('**') && part.endsWith('**')) return <strong key={j} className="text-white font-semibold">{part.slice(2, -2)}</strong>;
      return part;
    });
    return <p key={i} className="mb-2 leading-relaxed">{parts}</p>;
  });
};
