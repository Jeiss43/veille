const callGemini = async (prompt, signal, key) => {
  if (!key) throw new Error("Clé API manquante");
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${key}`;
  const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: CONFIG.aiPromptRole }] } };
  let retries = 5, delay = 1000;
  
  while (retries > 0) {
    try {
      if (signal?.aborted) throw new DOMException('Aborted', 'AbortError');
      const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload), signal });
      if (!response.ok) throw new Error('Erreur API');
      const data = await response.json();
      return data?.candidates?.[0]?.content?.parts?.[0]?.text || "Aucune réponse générée.";
    } catch (error) {
      if (error.name === 'AbortError') throw error;
      retries--;
      if (retries === 0) throw error;
      await new Promise(res => setTimeout(res, delay));
      delay *= 2;
    }
  }
};

const formatAiText = (text) => {
  if (!text) return null;
  const normalizedText = text.replace(/\\n/g, '\\n');
  return normalizedText.split('\\n').map((line, i) => {
    if (!line.trim()) return <br key={i} />;
    const parts = line.split(/(\*\*.*?\*\*)/g).map((part, j) => {
      if (part.startsWith('**') && part.endsWith('**')) return <strong key={j} className="text-white font-semibold">{part.slice(2, -2)}</strong>;
      return part;
    });
    return <p key={i} className="mb-2 leading-relaxed">{parts}</p>;
  });
};

                  <div className="mb-8">
                    <h4 className="flex items-center text-sm font-bold text-cyan-400 uppercase tracking-widest mb-3"><Info className="w-4 h-4 mr-2" />Le Contexte</h4>
                    <p className="text-lg leading-relaxed text-slate-200 italic border-l-2 border-cyan-800 pl-4 bg-slate-800/20 py-2 rounded-r-lg">{selectedArticle?.summary?.context}</p>
                  </div>
                  <div className="mb-8">
                    <h4 className="flex items-center text-sm font-bold text-purple-400 uppercase tracking-widest mb-4"><Zap className="w-4 h-4 mr-2" />Les Faits Marquants</h4>
                    <ul className="space-y-3">{selectedArticle?.summary?.keyPoints?.map((point, i) => (<li key={i} className="flex items-start"><span className="text-purple-500 mr-3 mt-1.5 text-xs">■</span><span className="leading-relaxed">{point}</span></li>))}</ul>
                  </div>
                  <div className="mb-4 bg-slate-800/40 p-6 rounded-xl border border-slate-700">
                    <h4 className="flex items-center text-sm font-bold text-emerald-400 uppercase tracking-widest mb-4"><Target className="w-4 h-4 mr-2" />{CONFIG.impactSectionTitle}</h4>
                    <ul className="space-y-4">{selectedArticle?.summary?.impacts?.map((point, i) => (<li key={i} className="flex items-start"><CheckCircle2 className="w-5 h-5 text-emerald-500 mr-3 flex-shrink-0 mt-0.5" /><span className="font-medium text-slate-200 leading-relaxed">{point}</span></li>))}</ul>
                  </div>
                </div>
              ) : (
                <div className="flex flex-col h-full space-y-6">
                  <div className="bg-cyan-950/20 border border-cyan-900/50 rounded-xl p-5 mb-2">
                    <label className="text-cyan-400 font-semibold mb-2 block text-sm"><Sparkles className="w-4 h-4 inline mr-2" />Votre clé API Gemini (sauvegarde locale)</label>
                    <input type="password" value={userApiKey} onChange={(e) => { setUserApiKey(e.target.value); localStorage.setItem('hubia_gemini_key', e.target.value); }} onFocus={(e) => e.target.type = 'text'} onBlur={(e) => e.target.type = 'password'} placeholder="Commence par AIzaSy..." className="w-full bg-slate-900 border border-slate-700 rounded-lg py-2 pl-3 pr-3 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 text-sm font-mono" />
                  </div>
                  <div className="bg-cyan-950/20 border border-cyan-900/50 rounded-xl p-5">
                    <h4 className="text-cyan-400 font-semibold mb-2 flex items-center"><Sparkles className="w-5 h-5 mr-2" />Que souhaitez-vous faire avec cet article ?</h4>
                    <p className="text-sm text-slate-400 mb-4">L&apos;IA analyse le contexte pour générer des documents de travail ou répondre à vos interrogations.</p>
                    <button onClick={handleGenerateMemo} disabled={isAiLoading} className="w-full py-3 px-4 bg-slate-800 hover:bg-slate-700 border border-slate-600 rounded-lg text-white font-medium flex items-center justify-center transition-colors disabled:opacity-50">
                      {isAiLoading && !userQuery ? <Loader2 className="w-5 h-5 mr-2 animate-spin text-cyan-400" /> : <MessageSquare className="w-5 h-5 mr-2 text-cyan-400" />}
                      ✨ Rédiger un mémo interne de synthèse
                    </button>
                  </div>
                  <div className="relative">
                    <input type="text" value={userQuery} onChange={(e) => setUserQuery(e.target.value)} onKeyDown={handleQueryKeyDown} placeholder="Posez une question sur cet article..." disabled={isAiLoading} className="w-full bg-slate-900 border border-slate-700 rounded-xl py-3 pl-4 pr-12 text-white placeholder-slate-500 focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500" />
                    <button onClick={handleCustomQuery} disabled={isAiLoading || !userQuery.trim()} className="absolute right-2 top-2 p-1.5 bg-cyan-600 hover:bg-cyan-500 rounded-lg text-white disabled:opacity-50 transition-colors">
                      {isAiLoading && userQuery ? <Loader2 className="w-4 h-4 animate-spin" /> : <Send className="w-4 h-4" />}
                    </button>
                  </div>
                  {aiResponse && (
                    <div className="mt-4 bg-slate-800/60 border border-slate-700 rounded-xl p-5 relative">
                      <button onClick={copyToClipboard} className="absolute top-4 right-4 p-1.5 text-slate-400 hover:text-white bg-slate-700/50 hover:bg-slate-600 rounded-md transition-colors" title="Copier">
                        {copySuccess ? <CheckCircle2 className="w-4 h-4 text-emerald-400" /> : <Copy className="w-4 h-4" />}
                      </button>
                      <div className="flex items-center mb-3"><Sparkles className="w-5 h-5 text-cyan-400 mr-2" /><span className="font-semibold text-white">Réponse de l&apos;expert IA</span></div>
                      <div className="text-slate-300 text-sm mt-2">{formatAiText(aiResponse)}</div>
                    </div>
                  )}
                </div>
              )}
            </div>
            <div className="p-6 border-t border-slate-800 bg-slate-900 flex justify-end">
              <button onClick={closeArticle} className="px-6 py-2.5 rounded-xl border border-slate-600 text-slate-300 font-semibold hover:bg-slate-800 hover:text-white transition-colors">Fermer</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

        /* INJECTION AUTOMATIQUE POUR RENDRE LE COMPOSANT SUR PAGE STATIQUE */
        const root = createRoot(document.getElementById('root'));
        root.render(<HubIA />);
    </script>
</body>
</html>
